<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Demon List</title>
    
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <style>
        :root {
            /* Крутая темная палитра с неоновыми элементами */
            --bg-card: rgba(20, 20, 25, 0.85);
            --border-card: rgba(255, 65, 54, 0.2);
            --border-hover: rgba(255, 65, 54, 0.5);
            --gd-blue: #00d2ff;
            --text-light: #ffffff;
            --text-muted: #b3b3b3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        body {
            /* Плавный вертикальный градиент: сверху красный, снизу черный */
            background: linear-gradient(to bottom, #4a0d0d 0%, #000000 40%, #000000 100%);
            background-attachment: fixed;
            color: var(--text-light);
            padding: 40px 0 60px 0;
            min-height: 100vh;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            padding: 0 15px;
        }

        /* Шапка */
        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.3rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-light);
            text-shadow: 0 0 15px rgba(255, 65, 54, 0.6);
            margin-bottom: 25px;
        }

        /* Навигация в стиле кнопок меню GD */
        nav {
            display: inline-flex;
            background: rgba(0, 0, 0, 0.6);
            padding: 6px;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            gap: 6px;
        }

        nav button {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 10px 22px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.95rem;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }

        nav button:hover {
            color: var(--text-light);
            background: rgba(255, 255, 255, 0.05);
        }

        nav button.active {
            background: #ff4136;
            color: var(--text-light);
            box-shadow: 0 0 10px rgba(255, 65, 54, 0.5);
        }

        /* Контент вкладок */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Карточки уровней */
        .list-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .level-card {
            background: var(--bg-card);
            border: 2px solid var(--border-card);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            transition: all 0.25s ease;
        }

        .level-card:hover {
            transform: translateY(-2px);
            border-color: var(--border-hover);
            box-shadow: 0 6px 25px rgba(255, 65, 54, 0.15);
        }

        .level-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .level-main {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        /* Иконка сложности заменяет старый маркер позиции */
        .level-demon-icon {
            width: 55px;
            height: 55px;
            object-fit: contain;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.2));
        }

        /* Голубая рамочка для номера уровня рядом с названием */
        .level-pos-badge {
            font-size: 1rem;
            font-weight: 800;
            color: var(--gd-blue);
            border: 2px solid var(--gd-blue);
            padding: 2px 8px;
            border-radius: 6px;
            background: rgba(0, 210, 255, 0.05);
            text-shadow: 0 0 5px rgba(0, 210, 255, 0.4);
            box-shadow: 0 0 8px rgba(0, 210, 255, 0.2);
        }

        .level-title-block {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 4px;
        }

        .level-title {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text-light);
            letter-spacing: 0.5px;
        }

        .level-meta {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 3px;
        }

        .level-meta span {
            color: var(--text-light);
            font-weight: 600;
        }

        /* Кнопка раскрытия рекордов */
        .verifies-toggle {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            color: var(--text-light);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 700;
            transition: all 0.2s ease;
        }

        .verifies-toggle:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* Таблица прохождений */
        .verifies-container {
            display: none;
            margin-top: 18px;
            border-top: 2px dashed rgba(255, 255, 255, 0.1);
            padding-top: 14px;
        }

        .verify-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            text-align: left;
        }

        .verify-table th {
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            padding: 8px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .verify-table td {
            padding: 10px 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .verify-table tr:last-child td {
            border-bottom: none;
        }

        .verify-table a {
            color: var(--gd-blue);
            text-decoration: none;
            font-weight: 700;
        }

        .verify-table a:hover {
            text-decoration: underline;
        }

        /* Вкладка REQ и Рулетка */
        .req-box, .roulette-box {
            background: var(--bg-card);
            border: 2px solid var(--border-card);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .req-box p, .roulette-box p {
            color: var(--text-muted);
            margin-bottom: 25px;
            font-size: 1.05rem;
            line-height: 1.6;
        }

        /* Кнопка действий */
        .btn-action {
            display: inline-block;
            background: #ff4136;
            color: #ffffff;
            padding: 12px 26px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 65, 54, 0.3);
            transition: all 0.15s ease;
        }

        .btn-action:hover {
            background: #e53227;
            box-shadow: 0 0 15px rgba(255, 65, 54, 0.6);
            transform: translateY(-1px);
        }

        #roulette-screen {
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.7rem;
            font-weight: 800;
            color: var(--text-light);
            margin: 20px 0 25px 0;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        /* Адаптивность */
        @media (max-width: 600px) {
            body { padding: 20px 0 40px 0; }
            .level-header { flex-direction: column; align-items: flex-start; }
            .verifies-toggle { width: 100%; text-align: center; }
            .level-main { width: 100%; }
            
            .verify-table th { display: none; }
            .verify-table tr { display: block; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
            .verify-table td { display: block; padding: 4px 8px; border: none; }
            .verify-table td::before {
                content: attr(data-label) ": ";
                color: var(--text-muted);
                font-weight: 600;
            }
        }
    </style>
</head>
<body>

    <header class="container">
        <h1>Pixel Dash Demon List</h1>
        <nav>
            <button class="nav-btn active" onclick="switchTab('list')">Список</button>
            <button class="nav-btn" onclick="switchTab('req')">REQ</button>
            <button class="nav-btn" onclick="switchTab('roulette')">Roulette</button>
        </nav>
    </header>

    <main class="container">
        <div id="tab-list" class="tab-content active">
            <div id="demon-list" class="list-wrapper">
                <p style="text-align:center; color:var(--text-muted); padding: 20px;">Загрузка списка демонов...</p>
            </div>
        </div>

        <div id="tab-req" class="tab-content">
            <div class="req-box">
                <p>Пройди демона из нашего списка и отправь доказательство в специальный Discord-канал. Модераторы проверят запись и добавят твой рекорд в таблицу.</p>
                <a href="https://discord.com/channels/1513797717074378872/1518175415062106253" target="_blank" class="btn-action">Подать своё прохождение</a>
            </div>
        </div>

        <div id="tab-roulette" class="tab-content">
            <div class="roulette-box">
                <p>Система выберет случайный демон-уровень из официального списка.</p>
                <div id="roulette-screen">— — —</div>
                <button class="btn-action" onclick="spinRoulette()">Выбрать случайный уровень</button>
            </div>
        </div>
    </main>

    <script>
        let globalLevels = [];
        let globalVerifies = [];

        // Массив иконок сложностей по значениям difficulty (от 1 до 5)
        const difficultyIcons = {
            1: "https://pixeldash.ps.fhgdps.com/browser/assets/demon/easy.png",
            2: "https://pixeldash.ps.fhgdps.com/browser/assets/demon/medium.png",
            3: "https://pixeldash.ps.fhgdps.com/browser/assets/demon/demon.png",
            4: "https://pixeldash.ps.fhgdps.com/browser/assets/demon/insane.png",
            5: "https://pixeldash.ps.fhgdps.com/browser/assets/demon/extreme.png"
        };

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(`tab-${tabName}`).classList.add('active');
            event.target.classList.add('active');
        }

        async function loadListData() {
            try {
                const listResponse = await fetch('data/list.json');
                globalLevels = await listResponse.json();

                try {
                    const verifyResponse = await fetch('data/verify.json');
                    globalVerifies = await verifyResponse.json();
                } catch(e) {
                    console.log("Данные верификации отсутствуют или пусты.");
                }

                renderList();
            } catch (error) {
                document.getElementById('demon-list').innerHTML = `<p style="color:#ff4136; text-align:center; padding:20px; font-weight:700;">Ошибка загрузки данных из папки data/</p>`;
            }
        }

        function renderList() {
            const container = document.getElementById('demon-list');
            container.innerHTML = '';

            globalLevels.forEach((level, index) => {
                const levelVerifies = globalVerifies.filter(v => v.level_id === level.level_id);

                // Получаем нужную иконку или дефолтную, если difficulty не указан или некорректен
                const iconUrl = difficultyIcons[level.difficulty] || difficultyIcons[3];

                let verifiesHtml = '';
                if(levelVerifies.length > 0) {
                    verifiesHtml = `
                        <button class="verifies-toggle" onclick="toggleVerifies(event, '${level.level_id}')">Рекорды (${levelVerifies.length})</button>
                        <div id="verifies-${level.level_id}" class="verifies-container">
                            <table class="verify-table">
                                <thead>
                                    <tr>
                                        <th>Игрок</th>
                                        <th>Устройство</th>
                                        <th>FPS</th>
                                        <th>Видео</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${levelVerifies.map(v => `
                                        <tr>
                                            <td data-label="Игрок" style="font-weight:700; color: #fff;">${v.username}</td>
                                            <td data-label="Устройство">${v.device}</td>
                                            <td data-label="FPS">${v.fps}</td>
                                            <td data-label="Видео"><a href="${v.video_url}" target="_blank">YouTube ↗</a></td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    `;
                } else {
                    verifiesHtml = `<button class="verifies-toggle" style="opacity:0.3; cursor:default; background:transparent; color:#666; border-color:rgba(255,255,255,0.05);">Нет рекордов</button>`;
                }

                const card = document.createElement('div');
                card.className = 'level-card';
                card.innerHTML = `
                    <div class="level-header">
                        <div class="level-main">
                            <img src="${iconUrl}" alt="Demon" class="level-demon-icon">
                            <div>
                                <div class="level-title-block">
                                    <span class="level-pos-badge">#${index + 1}</span>
                                    <div class="level-title">${level.name}</div>
                                </div>
                                <div class="level-meta">Создатель: <span>${level.creator}</span> | ID: <span>${level.level_id}</span></div>
                                <div class="level-meta" style="font-size:0.85rem;">Автор верификации: <span>${level.publisher}</span></div>
                            </div>
                        </div>
                        <div>
                            ${verifiesHtml}
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function toggleVerifies(event, id) {
            const el = document.getElementById(`verifies-${id}`);
            if(el.style.display === 'block') {
                el.style.display = 'none';
            } else {
                el.style.display = 'block';
            }
        }

        function spinRoulette() {
            if(globalLevels.length === 0) {
                document.getElementById('roulette-screen').innerText = "Список пуст!";
                return;
            }
            
            const screen = document.getElementById('roulette-screen');
            let counter = 0;
            
            const interval = setInterval(() => {
                const randomLevel = globalLevels[Math.floor(Math.random() * globalLevels.length)];
                screen.innerText = randomLevel.name;
                counter++;
                if(counter > 12) {
                    clearInterval(interval);
                    const finalLevel = globalLevels[Math.floor(Math.random() * globalLevels.length)];
                    screen.innerHTML = `<span style="color:var(--gd-blue); font-weight:800;">${finalLevel.name}</span> &nbsp;(ID: ${finalLevel.level_id})`;
                }
            }, 80);
        }

        window.onload = loadListData;
    </script>
</body>
</html>
